# render.yaml
# Deploy n8n on Render using the official n8n Docker image + Render Postgres.
# This is mostly-free for testing, but Render Free Postgres expires after 30 days.

services:
  - type: web
    name: n8n-superdad
    runtime: image
    plan: free

    image:
      url: docker.io/n8nio/n8n:latest

    envVars:
      - key: PORT
        value: 5678

      - key: N8N_PORT
        value: 5678

      - key: GENERIC_TIMEZONE
        value: Asia/Kolkata

      - key: TZ
        value: Asia/Kolkata

      - key: N8N_ENCRYPTION_KEY
        generateValue: true

      - key: DB_TYPE
        value: postgresdb

      - key: DB_POSTGRESDB_DATABASE
        fromDatabase:
          name: n8n-db-superdad
          property: database

      - key: DB_POSTGRESDB_HOST
        fromDatabase:
          name: n8n-db-superdad
          property: host

      - key: DB_POSTGRESDB_PORT
        fromDatabase:
          name: n8n-db-superdad
          property: port

      - key: DB_POSTGRESDB_USER
        fromDatabase:
          name: n8n-db-superdad
          property: user

      - key: DB_POSTGRESDB_PASSWORD
        fromDatabase:
          name: n8n-db-superdad
          property: password

      - key: N8N_DIAGNOSTICS_ENABLED
        value: false

      - key: N8N_PERSONALIZATION_ENABLED
        value: false

      - key: EXECUTIONS_DATA_PRUNE
        value: true

      - key: EXECUTIONS_DATA_MAX_AGE
        value: 168

      - key: N8N_VERSION_NOTIFICATIONS_ENABLED
        value: true

databases:
  - name: n8n-db-superdad
    plan: free
